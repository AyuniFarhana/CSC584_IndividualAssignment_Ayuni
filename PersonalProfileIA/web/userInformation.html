<!DOCTYPE html>
<html>
   <head>
       <title>User Information Form</title>

       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

       <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
       
       <style>
        body{
            background: #f3e8ff;
            font-family: Arial, sans-serif;
        }
        .card{
            width: 60%;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(120, 80, 180, 0.2);
        }
        h2{
            text-align: center;
            color: #5b21b6;
            margin-bottom: 20px;
        }
        label{
            font-weight: bold;
            color: #5b21b6;
        }
        .form-control{
            border-radius: 10px;
        }
        .btn-primary{
            background-color: #8b5cf6;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
        }
        .btn-primary:hover{
            background-color: #7c3aed;
        }
        .icon{
            margin-right: 6px;
            color: #8b5cf6;
        }
       </style>
   </head>
<body>
    <div class="card">
        <h2><i class="fa-solid fa-user"></i>Fill In Your Information</h2>
        
        <form action="profileServlet"
          method="post"
          onsubmit="return validateForm()">

        <div class="mb-3">
            <label>
                <i class="fa-solid fa-user icon"></i>
                Name
            </label>
            <input type="text"
                   class="form-control"
                   id="name"
                   name="name">
        </div>
        <div class="mb-3">
            <label>
                <i class="fa-solid fa-id-card icon"></i>
                Student ID
            </label>
            <input type="text"
                   class="form-control"
                   name="studentid">
        </div>
        <div class="mb-3">
            <label>
                <i class="fa-solid fa-book icon"></i>
                Program
            </label>
            <input type="text"
                   class="form-control"
                   name="program">
        </div>
        <div class="mb-3">
            <label>
                <i class="fa-solid fa-envelope icon"></i>
                Email
            </label>
            <input type="email"
                   class="form-control"
                   name="email">
        </div>
        <div class="mb-3">
            <label>
                <i class="fa-solid fa-star icon"></i>
                Hobbies
            </label>
            <input type="text"
                   class="form-control"
                   name="hobbies">
        </div>
        <div class="mb-3">
            <label>
                <i class="fa-solid fa-pen icon"></i>
                Self Introduction
            </label>
            <textarea class="form-control"
                      name="intro"
                      rows="4"></textarea>
        </div>
        <button type="submit"
                class="btn btn-primary w-100">

            <i class="fa-solid fa-paper-plane"></i>
            Submit Profile
        </button>
        </form>
    </div>

<script>
    function validateForm(){
        let name = document.getElementById("name").value;
        let studentid = document.querySelector("[name='studentid']").value;
        let program = document.querySelector("[name='program']").value;
        let email = document.querySelector("[name='email']").value;
        let hobbies = document.querySelector("[name='hobbies']").value;
        let intro = document.querySelector("[name='intro']").value;

        if(name === ""){
            alert("Please enter your name");
            return false;
        }
        if(studentid === ""){
            alert("Please enter your Student ID");
            return false;
        }
        if(program === ""){
            alert("Please enter your program");
            return false;
        }
        if(email === ""){
            alert("Please enter your email");
            return false;
        }
        if(hobbies === ""){
            alert("Please enter your hobbies");
            return false;
        }
        if(intro === ""){
            alert("Please intro yourself");
            return false;
        }
    return true;}

    const params = new URLSearchParams(window.location.search);
    if (params.get("error") === "duplicate") {
     alert("Student ID already exists!");
    }
</script>

</body>
</html>
